services:
   postgres:
      image: postgres:16-alpine
      container_name: evently_db
      restart: unless-stopped
      environment:
         POSTGRES_USER: evently
         POSTGRES_PASSWORD: evently
         POSTGRES_DB: evently
      ports:
         - '5432:5432'
      volumes:
         - postgres_data:/var/lib/postgresql/data
      healthcheck:
         test: ['CMD-SHELL', 'pg_isready -U evently -d evently']
         interval: 5s
         timeout: 5s
         retries: 5

volumes:
   postgres_data:
